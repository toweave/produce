name: Build and Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm typecheck

  build:
    needs: typecheck
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            pkg-args: --linux AppImage deb
            artifact-name: produce-linux
          - os: windows-latest
            target: win
            pkg-args: --win
            artifact-name: produce-windows
          - os: macos-latest
            target: mac
            pkg-args: --mac --dmg
            artifact-name: produce-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux system dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 libnotify-bin

      - run: pnpm install

      - name: Build and package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm build
          pnpm electron-builder ${{ matrix.pkg-args }} --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/**
          if-no-files-found: warn
